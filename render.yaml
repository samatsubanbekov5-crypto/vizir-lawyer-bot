services:
  - type: web
    name: vizir-lawyer-bot
    env: docker
    dockerfilePath: ./Dockerfile
    
    # Переменные окружения
    envVars:
      - key: LAWYER_BOT_TOKEN
        sync: false
      - key: LAWYER_WEBHOOK_URL
        sync: false
      - key: ADMIN_ID
        value: "7728619214"
      - key: CLIENT_BOT_TOKEN
        sync: false
      - key: CLIENT_BOT_URL
        value: "https://vizir-bot.onrender.com"
      - key: DATA_DIR
        value: "/data"
    
    # Диск для хранения данных (бесплатный — 1 ГБ)
    disk:
      name: vizir-data
      mountPath: /data
      sizeGB: 1
    
    # Автоматический перезапуск при обновлении кода
    autoDeploy: true
